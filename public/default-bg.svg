<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Light airy background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="40%"  stop-color="#f5f3ff"/>
      <stop offset="70%"  stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>

    <!-- Soft center lightness -->
    <radialGradient id="centerLight" cx="50%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Pastel ball gradients — soft, desaturated -->
    <radialGradient id="ballLavender" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#e0d9ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <radialGradient id="ballSky" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </radialGradient>
    <radialGradient id="ballMint" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </radialGradient>
    <radialGradient id="ballRose" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </radialGradient>
    <radialGradient id="ballPeach" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </radialGradient>
    <radialGradient id="ballLemon" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </radialGradient>
    <radialGradient id="ballLilac" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#f5d0fe"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </radialGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="1" dy="3" stdDeviation="7" flood-color="rgba(99,102,241,0.2)"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#centerLight)"/>

  <!-- Large soft halo blobs in corners -->
  <g filter="url(#softBlur)" opacity="0.35">
    <circle cx="200"  cy="200"  r="200" fill="#c4b5fd"/>
    <circle cx="1720" cy="880"  r="220" fill="#f9a8d4"/>
    <circle cx="1800" cy="180"  r="160" fill="#86efac"/>
    <circle cx="120"  cy="900"  r="180" fill="#7dd3fc"/>
  </g>

  <!-- Subtle decorative rings -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="1.5" fill="none">
    <circle cx="960" cy="540" r="280"/>
    <circle cx="960" cy="540" r="460"/>
    <circle cx="960" cy="540" r="640"/>
  </g>

  <!-- Confetti — using the pastel palette -->
  <g opacity="0.65">
    <!-- Rectangles scattered at edges -->
    <rect x="135"  y="88"   width="14" height="6"  rx="3" fill="#a78bfa" transform="rotate(-28 142 91)"/>
    <rect x="305"  y="52"   width="11" height="5"  rx="2" fill="#34d399" transform="rotate(18 310 54)"/>
    <rect x="520"  y="125"  width="13" height="6"  rx="3" fill="#fb7185" transform="rotate(-42 526 128)"/>
    <rect x="730"  y="68"   width="16" height="7"  rx="3" fill="#38bdf8" transform="rotate(32 738 71)"/>
    <rect x="990"  y="42"   width="11" height="5"  rx="2" fill="#facc15" transform="rotate(-20 995 44)"/>
    <rect x="1200" y="98"   width="13" height="6"  rx="3" fill="#e879f9" transform="rotate(24 1206 101)"/>
    <rect x="1420" y="58"   width="15" height="7"  rx="3" fill="#fb923c" transform="rotate(-36 1427 61)"/>
    <rect x="1630" y="108"  width="10" height="5"  rx="2" fill="#a78bfa" transform="rotate(14 1635 110)"/>
    <rect x="1815" y="78"   width="14" height="6"  rx="3" fill="#34d399" transform="rotate(-30 1822 81)"/>

    <rect x="58"   y="370"  width="12" height="6"  rx="2" fill="#fb7185" transform="rotate(22 64 373)"/>
    <rect x="195"  y="470"  width="10" height="5"  rx="2" fill="#38bdf8" transform="rotate(-32 200 472)"/>
    <rect x="1698" y="345"  width="13" height="6"  rx="3" fill="#facc15" transform="rotate(20 1704 348)"/>
    <rect x="1862" y="455"  width="11" height="5"  rx="2" fill="#e879f9" transform="rotate(-24 1867 457)"/>

    <rect x="98"   y="690"  width="14" height="7"  rx="3" fill="#a78bfa" transform="rotate(37 105 693)"/>
    <rect x="245"  y="815"  width="10" height="5"  rx="2" fill="#fb923c" transform="rotate(-17 250 817)"/>
    <rect x="1715" y="745"  width="12" height="6"  rx="2" fill="#34d399" transform="rotate(27 1721 748)"/>
    <rect x="1848" y="855"  width="15" height="7"  rx="3" fill="#38bdf8" transform="rotate(-40 1855 858)"/>

    <rect x="345"  y="955"  width="11" height="5"  rx="2" fill="#fb7185" transform="rotate(22 350 957)"/>
    <rect x="595"  y="1008" width="13" height="6"  rx="3" fill="#facc15" transform="rotate(-27 601 1010)"/>
    <rect x="1295" y="975"  width="10" height="5"  rx="2" fill="#e879f9" transform="rotate(32 1300 977)"/>
    <rect x="1548" y="1025" width="14" height="6"  rx="3" fill="#a78bfa" transform="rotate(-20 1555 1028)"/>
  </g>

  <!-- Confetti dots -->
  <g opacity="0.55">
    <circle cx="175"  cy="158"  r="5"  fill="#a78bfa"/>
    <circle cx="385"  cy="198"  r="4"  fill="#34d399"/>
    <circle cx="645"  cy="92"   r="6"  fill="#fb7185"/>
    <circle cx="848"  cy="172"  r="4"  fill="#38bdf8"/>
    <circle cx="1098" cy="78"   r="5"  fill="#facc15"/>
    <circle cx="1318" cy="162"  r="6"  fill="#e879f9"/>
    <circle cx="1545" cy="88"   r="4"  fill="#fb923c"/>
    <circle cx="1758" cy="172"  r="5"  fill="#a78bfa"/>
    <circle cx="88"   cy="545"  r="5"  fill="#34d399"/>
    <circle cx="1878" cy="528"  r="4"  fill="#fb7185"/>
    <circle cx="72"   cy="858"  r="6"  fill="#38bdf8"/>
    <circle cx="1868" cy="775"  r="5"  fill="#facc15"/>
    <circle cx="448"  cy="998"  r="4"  fill="#e879f9"/>
    <circle cx="748"  cy="1048" r="5"  fill="#fb923c"/>
    <circle cx="1148" cy="1018" r="6"  fill="#a78bfa"/>
    <circle cx="1478" cy="998"  r="4"  fill="#34d399"/>
    <circle cx="1748" cy="1038" r="5"  fill="#fb7185"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="#facc15" opacity="0.6">
    <path d="M1762 218 l3 -9 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 z"/>
    <path d="M158  442 l2.5 -8 l2.5 8 l8 2.5 l-8 2.5 l-2.5 8 l-2.5 -8 l-8 -2.5 z"/>
    <path d="M482  918 l3 -9 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 z"/>
    <path d="M1482 868 l2.5 -8 l2.5 8 l8 2.5 l-8 2.5 l-2.5 8 l-2.5 -8 l-8 -2.5 z"/>
    <path d="M922  202 l2 -6 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 z"/>
    <path d="M1752 638 l2 -6 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 z"/>
    <path d="M172  638 l2 -6 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 z"/>
  </g>

  <!-- Bingo balls — pastel, with drop shadow -->
  <!-- Left - sky 14 -->
  <g filter="url(#shadow)">
    <circle cx="72"   cy="310"  r="52"  fill="url(#ballSky)"/>
    <circle cx="72"   cy="310"  r="52"  fill="none" stroke="white" stroke-width="3"   stroke-opacity="0.7"/>
    <circle cx="72"   cy="310"  r="38"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Left bottom - peach 42 -->
  <g filter="url(#shadow)">
    <circle cx="110"  cy="800"  r="60"  fill="url(#ballPeach)"/>
    <circle cx="110"  cy="800"  r="60"  fill="none" stroke="white" stroke-width="3"   stroke-opacity="0.7"/>
    <circle cx="110"  cy="800"  r="44"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Right top - mint 67 -->
  <g filter="url(#shadow)">
    <circle cx="1858" cy="280"  r="56"  fill="url(#ballMint)"/>
    <circle cx="1858" cy="280"  r="56"  fill="none" stroke="white" stroke-width="3"   stroke-opacity="0.7"/>
    <circle cx="1858" cy="280"  r="41"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Right mid - lavender 83 -->
  <g filter="url(#shadow)">
    <circle cx="1894" cy="620"  r="64"  fill="url(#ballLavender)"/>
    <circle cx="1894" cy="620"  r="64"  fill="none" stroke="white" stroke-width="3"   stroke-opacity="0.7"/>
    <circle cx="1894" cy="620"  r="47"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Right bottom - rose 29 -->
  <g filter="url(#shadow)">
    <circle cx="1840" cy="910"  r="58"  fill="url(#ballRose)"/>
    <circle cx="1840" cy="910"  r="58"  fill="none" stroke="white" stroke-width="3"   stroke-opacity="0.7"/>
    <circle cx="1840" cy="910"  r="42"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Bottom center - lilac 55 -->
  <g filter="url(#shadow)">
    <circle cx="960"  cy="1054"  r="38"  fill="url(#ballLilac)"/>
    <circle cx="960"  cy="1054"  r="38"  fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="960"  cy="1054"  r="27"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Soft edge vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#e0e7ff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.3"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
